app = 'hosni-project'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'     # scheduler must keep running
  auto_start_machines = true
  min_machines_running = 1

[env]
  # Non-secret config. Secrets (ADMIN_KEY, BANNER_BASE_URL) go via:
  #   fly secrets set ADMIN_KEY=... BANNER_BASE_URL=...
  BANNER_PATH_PREFIX = '/StudentRegistrationSsb/ssb'
  BANNER_TERM = '202710'
  CHECK_INTERVAL_MINUTES = '5'
  BAILEYS_BRIDGE_URL = 'http://localhost:3001'
  BRIDGE_PORT = '3001'
  PYTHON_WEBHOOK_URL = 'http://localhost:8000/webhook/whatsapp'
  WA_SESSION_PATH = '/data/wa_session'
  DATABASE_PATH = '/data/seatwatch.db'
  PUBLIC_BASE_URL = 'https://hosni-project.fly.dev'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'   # app uses ~250MB; 512 is safe + cheap (~$3.5/mo)

[mounts]
  source = 'seatwatch_data'
  destination = '/data'
